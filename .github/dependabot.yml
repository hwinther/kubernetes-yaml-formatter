version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      types:
        patterns:
          - "@types/*"
      eslint:
        patterns:
          - "eslint"
          - "@typescript-eslint/*"
      webpack:
        patterns:
          - "webpack"
          - "webpack-cli"
          - "ts-loader"
      vscode-test:
        patterns:
          - "@vscode/test-cli"
          - "@vscode/test-electron"
          - "@types/mocha"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
