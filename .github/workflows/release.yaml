name: Release to Visual Studio Code Extension Marketplace

# Marketplace pre-release convention (per VS Code docs):
#   even minor = stable     (0.2.x, 0.4.x, 1.0.x, ...)
#   odd  minor = pre-release (0.3.x, 0.5.x, 1.1.x, ...)
# Versions are plain major.minor.patch — semver pre-release suffixes like -rc1 are NOT supported.

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: read

jobs:
  publish:
    name: Publish to Marketplace
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Verify package.json version matches tag
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${{ github.ref_name }}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::package.json version ($PKG_VERSION) does not match tag ($TAG_VERSION). Bump package.json before tagging."
            exit 1
          fi

      - name: Determine release channel
        id: channel
        run: |
          MINOR=$(echo "${{ github.ref_name }}" | cut -d. -f2)
          if [ $((MINOR % 2)) -eq 1 ]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            echo "Detected odd minor ($MINOR) → publishing as pre-release"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            echo "Detected even minor ($MINOR) → publishing as stable"
          fi

      - name: Install dependencies
        run: npm ci

      - name: Publish (pre-release)
        if: steps.channel.outputs.prerelease == 'true'
        run: npx @vscode/vsce publish --pre-release
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Publish (stable)
        if: steps.channel.outputs.prerelease == 'false'
        run: npx @vscode/vsce publish
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
